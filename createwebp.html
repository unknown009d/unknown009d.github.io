<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Druba | towebp</title>
    <style>
      #loading {
        display: none;
        margin-top: 10px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Convert Image to WebP</h1>
    <input type="file" name="imgfile" id="imgfile" />
    <div id="loading">Converting... Please wait.</div>

    <script>
      const convertToWebP = (file, quality = 0.6) => {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);
            canvas.toBlob(
              (blob) => {
                if (blob) resolve(blob);
                else reject("Conversion failed");
              },
              "image/webp",
              quality
            );
          };
          img.onerror = reject;

          const reader = new FileReader();
          reader.onload = (e) => {
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });
      };

      const input = document.querySelector("#imgfile");
      const loadingEl = document.querySelector("#loading");

      input.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Ask user for filename
        let outputName = prompt("Enter output filename (without extension):", file.name.replace(/\.\w+$/, ""));
        if (!outputName) outputName = file.name.replace(/\.\w+$/, "");

        loadingEl.style.display = "block";

        try {
          const webpBlob = await convertToWebP(file, 0.6);

          // Download the WebP file
          const url = URL.createObjectURL(webpBlob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `${outputName}.webp`;
          a.click();

          // Clean up
          setTimeout(() => URL.revokeObjectURL(url), 1000);
        } catch (err) {
          alert("Conversion failed: " + err);
        } finally {
          loadingEl.style.display = "none";
        }
      });
    </script>
  </body>
</html>
